<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Student Registration Form</h1>
            <p>Please fill in all the required information below</p>
        </div>
        
        <div class="form-container">
            <form id="registrationForm">
                <div class="row">
                    <div class="form-group">
                        <label class="required">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="student@example.com" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label class="required">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+251 9XX XXX XXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label class="required">Gender</label>
                        <div class="gender-group">
                            <input type="radio" name="gender" value="Male" id="male" required>
                            <label for="male">Male</label>
                            <input type="radio" name="gender" value="Female" id="female">
                            <label for="female">Female</label>
                            <input type="radio" name="gender" value="Other" id="other">
                            <label for="other">Other</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Blood Group</label>
                        <select id="bloodGroup" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required">Course/Department</label>
                    <select id="course" required>
                        <option value="">Select Course</option>
                        <option value="Computer Science">antropology</option>
                        <option value="Software Engineering">computr</option>
                        <option value="Information Technology"> enf</option>
                        <option value="Electrical Engineering">maths</option>
                        <option value="Business Administration">agro economics</option>
                        <option value="Accounting">aret</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Hobbies (Optional)</label>
                    <div class="hobbies-group">
                        <label><input type="checkbox" value="Reading"> Reading</label>
                        <label><input type="checkbox" value="Sports"> Sports</label>
                        <label><input type="checkbox" value="Music"> Music</label>
                        <label><input type="checkbox" value="Gaming"> Gaming</label>
                        <label><input type="checkbox" value="Travel"> Travel</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" rows="3" placeholder="Enter your full address"></textarea>
                </div>

                <button type="submit">Register Student</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
